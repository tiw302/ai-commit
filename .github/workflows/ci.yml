name: CI

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.23' # Using a stable version supported by GitHub Actions
        check-latest: true

    - name: Build
      run: go build -v -o ai-commit ./cmd/ai-commit

    - name: Run Tests
      run: go test -v ./...
